name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ${{ github.event.repository.name }}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm typecheck

      - name: Push schema to test DB
        run: pnpm db:push:test
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/${{ github.event.repository.name }}_test
          DB_ENV: test

      - run: pnpm test
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/${{ github.event.repository.name }}_test

name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  doctor:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
        name: "Install dependencies"
      - run: node src/index.js doctor
        name: "Doctor check"

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: npm test
        name: "Unit tests (Node)"

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: pip install pytest
        name: "Install pytest"
      - run: python -m pytest tests/ -v
        name: "Unit tests (Python)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check ESM imports
        run: grep -rn 'require(' src/ --include='*.js' && exit 1 || exit 0
      - name: Check no hardcoded paths
        run: grep -rn '/Users/\|/home/' src/ --include='*.js' && exit 1 || exit 0
      - name: Check shebang
        run: head -1 src/index.js | grep -q '#!/usr/bin/env node'

  # Smoke de empacotamento + scaffold. O test:pack prova o TARBALL real (pegaria,
  # p.ex., o strip do .gitignore pelo npm); o test:templates valida o scaffold lite.
  # O build PESADO (turbo) é opt-in local (GSTACK_TEMPLATE_INSTALL=1) — ainda fora
  # do CI até o template fullstack compilar limpo (deps/imports/tipos pendentes).
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: npm run test:pack
        name: "Pack smoke (tarball real)"
      - run: npm run test:templates
        name: "Template smoke (scaffold lite)"

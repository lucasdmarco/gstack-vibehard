name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  doctor:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
        name: "Install dependencies"
      - run: node src/index.js doctor
        name: "Doctor check"

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: npm test
        name: "Unit tests (Node)"

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: pip install pytest
        name: "Install pytest"
      - run: python -m pytest tests/ -v
        name: "Unit tests (Python)"
      - run: npm run coverage:ci
        name: "Coverage gate (c8, baseline ≥70%)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check ESM imports
        run: grep -rn 'require(' src/ --include='*.js' && exit 1 || exit 0
      - name: Check no hardcoded paths
        run: grep -rn '/Users/\|/home/' src/ --include='*.js' && exit 1 || exit 0
      - name: Check shebang
        run: head -1 src/index.js | grep -q '#!/usr/bin/env node'
      - name: Agent Factory drift guard (PRD 13 PR13.1)
        run: npm run build:agents -- --check
      - name: Command-lint (README só cita comando que existe — PRD30 F7-A)
        run: npm run lint:commands

  # Smoke de empacotamento + scaffold. O test:pack prova o TARBALL real (pegaria,
  # p.ex., o strip do .gitignore pelo npm); o test:templates valida o scaffold lite.
  # O build PESADO (turbo via pnpm) garante que o projeto fullstack gerado COMPILA.
  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
        name: "Enable corepack (pnpm)"
      - run: npm ci
        name: "Install dependencies"
      - run: npm run test:pack
        name: "Pack smoke (tarball real)"
      - run: npm run test:templates
        name: "Template smoke (scaffold lite)"
      - run: GSTACK_TEMPLATE_INSTALL=1 npm run test:templates
        name: "Template build PESADO (fullstack lite: pnpm install + turbo build)"
        timeout-minutes: 15

  # E2E lifecycle CROSS-OS (PRD 12 PR8): caixa-preta do produto PUBLICADO. Empacota
  # o tarball, instala num projeto temp e roda o BIN num HOME descartável pelo ciclo
  # doctor → dream audit → create → agents check → install --audit-only → uninstall.
  # Prova em Linux/Windows/macOS: (1) o truth contract no tarball == repo (18 REAL/0
  # PLACEBO — guard do fix v3.21.1); (2) isolamento de HOME (read-only e create não
  # escrevem config gstack; --save-report grava só o relatório).
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        name: "Install dependencies"
      - run: npm run test:e2e:lifecycle
        name: "E2E lifecycle (tarball → HOME fake → ciclo de vida)"
        env:
          GSTACK_E2E_LIFECYCLE: "1"
        timeout-minutes: 10
